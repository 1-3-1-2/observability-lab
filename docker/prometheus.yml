global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'apiservice'
    static_configs:
      - targets: ['apiservice:8080']

  - job_name: 'providerservice'
    static_configs:
      - targets: ['providerservice:8080']
